<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Productivity Dashboard</title>
    <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>

    <div class="container">
        <div id="overlay" class="overlay hidden"></div>

        <aside class="sidebar">
            <h2>Productivity</h2>
            <ul>
                <li id="navTasks" class="active">Tasks</li>
                <li id="navHabits">Habits</li>
                <li id="navStats">Stats</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="header">
            <div class="left-header">
                <button id="menuToggle">☰</button>
                <h1 id="pageTitle">Dashboard</h1>
            </div>
            <button id="themeToggle">🌙</button>
        </div>
    <!-- 🔹 TASKS (DEFAULT) -->
    <section id="tasksSection">
        <form id="taskForm">
            <input type="text" id="taskInput" placeholder="Enter task..." required>

            <select id="priorityInput" required>
                <option value="" disabled selected>Select Priority</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <input type="date" id="dueDate" required>

            <button type="submit">Add</button>
        </form>

        <div id="stats" class="stats">
            <div class="card">
                <h3>Total</h3>
                <p id="totalTasks">0</p>
            </div>
            <div class="card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>
            <div class="card">
                <h3>Pending</h3>
                <p id="pendingTasks">0</p>
            </div>
            <div class="card">
                <h3>High Priority</h3>
                <p id="highTasks">0</p>
            </div>
        </div>

        <div id="filters">
            <button data-filter="all">All</button>
            <button data-filter="completed">Completed</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="High">High</button>
            <button data-filter="Medium">Medium</button>
            <button data-filter="Low">Low</button>
        </div>

        <ul id="taskList"></ul>

    </section>

    <!-- 🔹 STATS -->
    <section id="statsSection" class="hidden">
        <div class="chart-grid">
            <div class="chart-box">
                <h3>Task Status</h3>
                <canvas id="taskChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>Priority Distribution</h3>
                <canvas id="priorityChart"></canvas>
            </div>
        </div>
    </section>

    <!-- 🔹 HABITS -->
    <section id="habitsSection" class="hidden">
        <h2>Habits (Coming Soon)</h2>
    </section>

</main>
    </div>

    <!-- Popup (outside container) -->
    <div id="editPopup" class="popup hidden">
        <div class="popup-content">
            <h3>Edit Task</h3>

            <input type="text" id="editTitle" required>

            <select id="editPriority" required>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <input type="date" id="editDate" required>

            <div class="popup-buttons">
                <button id="saveEdit">Save</button>
                <button id="cancelEdit">Cancel</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="JS/Main.js"></script>

</body>
</html>
