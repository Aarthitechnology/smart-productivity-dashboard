<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Productivtiy Dashboard</title>
    <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>
    <div class="container">
        <aside class = "sidebar">
            <h2>Productivity</h2>
            <ul>
                <li>Dashboard</li>
                <li>Tasks</li>
                <li>Habits</li>
                <li>Stats</li>
            </ul>
        </aside>
        <main class = "main">
            <h1>Task Manager</h1>
            <form id="taskForm">
                <input type="text" id="taskInput" placeholder="Enter task..." required>
                <select id="priorityInput">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <button type="submit">Add</button>
            </form>
            <div id="filters">
                <button data-filter="all">All</button>
                <button data-filter="completed">Completed</button>
                <button data-filter="pending">Pending</button>
                <button data-filter="High">High</button>
                <button data-filter="Medium">Medium</button>
                <button data-filter="Low">Low</button>
            </div>
<ul id="taskList"></ul>
        </main>
    </div>
    <script type="module" src="JS/Main.js"></script>
</body>
</html>
